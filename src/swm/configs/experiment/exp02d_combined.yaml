# @package _global_
# exp02d: combined objective = time-MSE + log_psd(amplitude) + hf_weight*hf_time, one single loss spanning
# all frequency bands. This is the strongest pretrain-once candidate: a single objective / single encoder
# that should serve every downstream variability task (pulsating HF, rotation LF, eclipse edges) at once.
# Usage: python -m swm.<stage> +experiment=exp02d_combined variant=B seed=0
exp_name: exp02d_combined
data:
  window: 256
  seq_len: 16
train:
  recon_aux:
    type: combined
    weight: 0.1
    psd_normalize: false
    hf_weight: 1.0
